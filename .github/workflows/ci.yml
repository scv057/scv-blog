name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx astro check
      - name: Build (includes Pagefind indexing)
        run: npm run build
